<!DOCTYPE html><html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ELVIS IPTV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#e81010;
  --red2:#b50d0d;
  --bg:#0d0d0f;
  --bg2:#141417;
  --bg3:#1c1c20;
  --border:rgba(255,255,255,.08);
  --text:#e8e8ec;
  --muted:rgba(255,255,255,.45);
  --radius:10px;
  --left-w:280px;
}
html,body{
  height:100%;width:100%;
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
img{display:block;max-width:100%;}
button{cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;}

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18);border-radius:2px;}

/* ══════════════════════════════════════
   LAYOUT PRINCIPAL — dois painéis fixos
══════════════════════════════════════ */
#app{
  display:flex;
  width:100vw;
  height:100vh;
  overflow:hidden;
}

/* ══════════════════════════════════════
   PAINEL ESQUERDO — lista de canais
══════════════════════════════════════ */
#left-panel{
  width:var(--left-w);
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  height:100vh;
  background:var(--bg2);
  border-right:1px solid var(--border);
  overflow:hidden;
}

/* ── Logo topo ── */
#left-header{
  display:flex;align-items:center;gap:8px;
  padding:14px 14px 10px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
#logo{display:flex;align-items:center;gap:7px;text-decoration:none;}
#logo svg{width:20px;height:20px;color:var(--red);}
#logo-text{font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:.08em;color:#fff;}
#logo-text b{color:var(--red);}

/* ── Abas de categoria ── */
#cat-tabs{
  display:flex;
  flex-direction:column;
  gap:2px;
  padding:8px 8px 0;
  overflow-y:auto;
  max-height:36vh;
  flex-shrink:0;
  scrollbar-width:thin;
}
.cat-tab{
  all:unset;
  display:block;
  width:100%;
  padding:7px 10px;
  border-radius:7px;
  font-size:.78rem;font-weight:600;
  color:var(--muted);
  cursor:pointer;
  transition:background .15s,color .15s;
  touch-action:manipulation;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.cat-tab:hover,.cat-tab.active{
  background:rgba(232,16,16,.15);
  color:#fff;
}
.cat-tab.active{
  background:rgba(232,16,16,.2);
  color:var(--red);
  font-weight:700;
  border-left:2px solid var(--red);
  padding-left:8px;
}

/* ── Divisor ── */
.panel-divider{
  height:1px;
  background:var(--border);
  margin:6px 8px;
  flex-shrink:0;
}

/* ── Lista de canais ── */
#channel-list{
  flex:1;
  overflow-y:auto;
  padding:4px 0 12px;
}
.sb-cat{
  padding:6px 14px 2px;
  font-size:.58rem;
  font-weight:700;
  letter-spacing:.12em;
  color:var(--muted);
  text-transform:uppercase;
  margin-top:6px;
}
.sb-item{
  display:flex;
  align-items:center;
  gap:8px;
  width:100%;
  text-align:left;
  padding:8px 14px;
  font-size:.8rem;
  color:var(--text);
  background:none;
  border:none;
  cursor:pointer;
  transition:background .12s,color .12s;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  border-left:2px solid transparent;
}
.sb-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.sb-item.active{
  background:rgba(232,16,16,.14);
  color:#fff;
  border-left:2px solid var(--red);
  padding-left:12px;
}
.sb-item .sb-logo{
  width:22px;height:22px;
  border-radius:4px;
  object-fit:contain;
  background:rgba(255,255,255,.04);
  flex-shrink:0;
}
.sb-item.hidden{display:none;}

/* ══════════════════════════════════════
   PAINEL DIREITO — player
══════════════════════════════════════ */
#right-panel{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
  background:#000;
  position:relative;
  overflow:hidden;
}

/* ── Estado vazio ── */
#player-empty{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:14px;
  color:var(--muted);
  user-select:none;
  pointer-events:none;
}
#player-empty svg{width:56px;height:56px;color:rgba(232,16,16,.3);}
#player-empty p{font-size:.9rem;font-family:'Oswald',sans-serif;letter-spacing:.06em;}
#player-empty small{font-size:.7rem;color:rgba(255,255,255,.2);}
#right-panel.has-player #player-empty{display:none;}

/* ── Barra de controle do player — SEMPRE VISÍVEL no topo ── */
#player-bar{
  position:relative;
  z-index:20;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:6px 10px;
  background:rgba(10,10,12,.97);
  border-bottom:1px solid rgba(255,255,255,.07);
  flex-shrink:0;
  min-height:44px;
  pointer-events:none;
}
/* barra só aparece quando tem canal ativo */
#right-panel:not(.has-player) #player-bar{ display:none; }

#player-info{
  display:flex;align-items:center;gap:8px;
  pointer-events:none;
  overflow:hidden;
}
#player-info-logo{
  width:26px;height:26px;
  border-radius:4px;
  object-fit:contain;
  background:rgba(255,255,255,.07);
  flex-shrink:0;
}
#player-ch-name{
  font-family:'Oswald',sans-serif;
  font-size:.88rem;font-weight:700;
  color:#fff;letter-spacing:.04em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
#player-brand{
  display:flex;align-items:center;gap:4px;
  opacity:.4;
  pointer-events:none;
  flex-shrink:0;
}
#player-brand svg{width:10px;height:10px;color:var(--red);}
#player-brand span{
  font-family:'Oswald',sans-serif;
  font-size:.52rem;font-weight:700;
  letter-spacing:.08em;color:#fff;
}
#player-brand span b{color:var(--red);}
#player-btns{
  display:flex;gap:5px;
  pointer-events:all;
  flex-shrink:0;
}
.pbar-btn{
  all:unset;
  display:flex;align-items:center;justify-content:center;
  gap:5px;
  height:30px;
  padding:0 10px;
  border-radius:6px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  color:#fff;
  font-size:.7rem;font-weight:600;
  cursor:pointer;
  transition:background .15s,transform .1s,border-color .15s;
  touch-action:manipulation;
  white-space:nowrap;
}
.pbar-btn svg{flex-shrink:0;}
.pbar-btn:hover,.pbar-btn:focus{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3);}
.pbar-btn:active{transform:scale(.93);}
.pbar-btn.reload:hover{background:rgba(50,120,255,.6);}
.pbar-btn.fullscreen-btn{background:rgba(160,120,0,.7);border-color:rgba(255,200,0,.3);color:#ffe566;}
.pbar-btn.fullscreen-btn:hover{background:rgba(210,165,0,.9);}
.pbar-btn.close-btn{background:rgba(160,0,0,.7);border-color:rgba(255,50,50,.25);}
.pbar-btn.close-btn:hover{background:rgba(220,16,16,.9);}

/* ── iframe do player ── */
#player-frame{
  display:block;
  width:100%;
  flex:1;
  border:none;
  background:#000;
  min-height:0;
}

/* ══ MODO TELA CHEIA (esconde painel esquerdo) ══ */
#app.fullscreen #left-panel{
  display:none;
}
#app.fullscreen #right-panel{
  width:100vw;
}
/* botão muda visual no modo fullscreen */
#app.fullscreen .pbar-btn.fullscreen-btn{
  background:rgba(100,80,0,.7);
  color:#ffcc00;
}

/* ══════════════════════════════════════
   TV / REMOTE CONTROL FOCUS
══════════════════════════════════════ */
:root{ --focus-color:#e81010; }
*:focus{ outline:none; }

.tv-focusable:focus,
.tv-focusable.tv-focus {
  outline: 3px solid var(--focus-color) !important;
  outline-offset: 2px;
  box-shadow: 0 0 0 4px rgba(232,16,16,.3), 0 0 14px rgba(232,16,16,.35) !important;
  border-color: var(--focus-color) !important;
  z-index: 10;
  position: relative;
}
.sb-item.tv-focus {
  background: rgba(232,16,16,.22) !important;
  color: #fff !important;
  border-left: 2px solid var(--red) !important;
  outline: none !important;
  box-shadow: inset 3px 0 0 var(--red) !important;
}
.cat-tab.tv-focus {
  background: rgba(232,16,16,.25) !important;
  color: #fff !important;
  outline: 2px solid var(--red) !important;
  outline-offset: 1px;
}
.pbar-btn.tv-focus {
  background: rgba(232,16,16,.6) !important;
  border-color: var(--red) !important;
  box-shadow: 0 0 0 2px rgba(232,16,16,.4) !important;
  outline: none !important;
}
body.tv-mode * { cursor: none !important; }

/* Indicador modo TV */
#tv-indicator {
  position:fixed;bottom:10px;right:10px;z-index:9998;
  background:rgba(232,16,16,.9);color:#fff;
  font-size:.6rem;font-weight:700;letter-spacing:.08em;
  padding:3px 8px;border-radius:5px;
  opacity:0;transition:opacity .3s;pointer-events:none;
  font-family:'Oswald',sans-serif;
}
#tv-indicator.show{opacity:1;}


</style>

function buildUI(){
  var tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = '';

  /* Tab "Todos" */
  var allTab = document.createElement('button');
  allTab.className = 'cat-tab active tv-focusable';
  allTab.textContent = 'Todos';
  allTab.dataset.cat = 'all';
  allTab.setAttribute('tabindex','0');
  allTab.onclick = function(){ filterCat('all', this); };
  tabs.appendChild(allTab);

  CATEGORIES.forEach(function(cat){
    var tab = document.createElement('button');
    tab.className = 'cat-tab tv-focusable';
    tab.textContent = cat.label;
    tab.dataset.cat = cat.id;
    tab.setAttribute('tabindex','0');
    tab.onclick = function(){ filterCat(cat.id, this); };
    tabs.appendChild(tab);
  });

  renderChannels('all');
}

/* ── Renderiza lista de canais conforme filtro ── */
function renderChannels(catId){
  var list = document.getElementById('channel-list');
  list.innerHTML = '';

  CATEGORIES.forEach(function(cat){
    if(catId !== 'all' && cat.id !== catId) return;

    if(catId === 'all'){
      var lbl = document.createElement('div');
      lbl.className = 'sb-cat';
      lbl.textContent = cat.label;
      list.appendChild(lbl);
    }

    cat.channels.forEach(function(ch){
      var btn = document.createElement('button');
      btn.className = 'sb-item tv-focusable';
      btn.dataset.ch = ch.ch;
      btn.setAttribute('tabindex','0');
      btn.innerHTML = '<img class="sb-logo" src="' + IMG + ch.img + '" alt="" onerror="this.style.display=\'none\'">' + ch.n;
      btn.onclick = function(){ openChannel(ch.ch, ch.n, ch.img); };
      if(ch.ch === currentCh) btn.classList.add('active');
      list.appendChild(btn);
    });
  });
}

/* ════════════════════════════════════════════
   FILTER
════════════════════════════════════════════ */
function filterCat(catId, el){
  activeCat = catId;
  document.querySelectorAll('.cat-tab').forEach(function(t){ t.classList.remove('active'); });
  if(el) el.classList.add('active');
  renderChannels(catId);
  /* scroll topo da lista */
  document.getElementById('channel-list').scrollTop = 0;
  /* foco primeiro item */
  setTimeout(function(){
    var first = document.querySelector('#channel-list .sb-item');
    if(first){ applyFocus('list', 0); }
  }, 40);
}

/* ════════════════════════════════════════════
   CHANNEL OPEN / CLOSE
════════════════════════════════════════════ */
function openChannel(ch, name, img){
  currentCh  = ch;
  currentImg = img || '';

  document.querySelectorAll('.sb-item').forEach(function(el){
    el.classList.toggle('active', el.dataset.ch === ch);
  });

  /* Player */
  document.getElementById('player-frame').src = BASE + ch;
  document.getElementById('right-panel').classList.add('has-player');

  /* Info no topo */
  var logo = document.getElementById('player-info-logo');
  logo.src = IMG + (img || '');
  logo.style.display = img ? '' : 'none';
  document.getElementById('player-ch-name').textContent = name || '';
}

function reloadPlayer(){
  var f = document.getElementById('player-frame');
  if(f.src) f.src = f.src;
}

function closePlayer(){
  document.getElementById('right-panel').classList.remove('has-player');
  document.getElementById('player-frame').src = '';
  currentCh = null;
  document.querySelectorAll('.sb-item').forEach(function(el){ el.classList.remove('active'); });
  if(isFullscreen) toggleFullscreen();
}

var isFullscreen = false;

function toggleFullscreen(){
  isFullscreen = !isFullscreen;
  document.getElementById('app').classList.toggle('fullscreen', isFullscreen);
  document.getElementById('fs-icon-expand').style.display = isFullscreen ? 'none' : '';
  document.getElementById('fs-icon-shrink').style.display = isFullscreen ? '' : 'none';
  document.getElementById('fs-label').textContent = isFullscreen ? 'Sair' : 'Tela Cheia';
}


/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
buildUI();

setTimeout(function(){ applyFocus('list', 0); }, 200);

/* ════════════════════════════════════════════
   TV BOX / REMOTE CONTROL NAVIGATION
════════════════════════════════════════════ */
(function(){

  /* Zonas: 'cats' = abas categoria, 'list' = canal, 'player' = botões player */
  var tvMode     = false;
  var focusZone  = 'list';
  var focusIndex = 0;
  var indicatorTmr;

  function getItems(zone){
    if(zone === 'cats')   return Array.from(document.querySelectorAll('#cat-tabs .cat-tab')).filter(function(e){ return e.offsetParent !== null; });
    if(zone === 'list')   return Array.from(document.querySelectorAll('#channel-list .sb-item')).filter(function(e){ return e.offsetParent !== null; });
    if(zone === 'player') return Array.from(document.querySelectorAll('#player-bar .pbar-btn')).filter(function(e){ return e.offsetParent !== null; });
    return [];
  }

  window.applyFocus = function(zone, idx){
    document.querySelectorAll('.tv-focus').forEach(function(el){ el.classList.remove('tv-focus'); });
    var items = getItems(zone);
    if(!items.length) return;
    if(idx < 0) idx = 0;
    if(idx >= items.length) idx = items.length - 1;
    focusZone  = zone;
    focusIndex = idx;
    var el = items[idx];
    el.classList.add('tv-focus');
    el.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'nearest' });
  };

  function activateTV(){
    if(!tvMode){
      tvMode = true;
      document.body.classList.add('tv-mode');
    }
    var ind = document.getElementById('tv-indicator');
    ind.classList.add('show');
    clearTimeout(indicatorTmr);
    indicatorTmr = setTimeout(function(){ ind.classList.remove('show'); }, 2000);
  }

  function detectZone(){
    return focusZone;
  }

  document.addEventListener('keydown', function(e){
    var key = e.key || e.keyCode;

    /* Keycodes Android TV */
    var km = {37:'ArrowLeft',38:'ArrowUp',39:'ArrowRight',40:'ArrowDown',13:'Enter',8:'Backspace',27:'Escape',
              403:'ColorRed',404:'ColorGreen',405:'ColorYellow',406:'ColorBlue',
              415:'MediaPlay',19:'MediaPause',413:'MediaStop',33:'PageUp',34:'PageDown',
              427:'ChannelUp',428:'ChannelDown',
              48:'0', 96:'0'};
    if(typeof key === 'number' && km[key]) key = km[key];

    var navKeys = ['ArrowLeft','ArrowUp','ArrowRight','ArrowDown','Enter','Backspace','Escape',
                   'ColorRed','ColorGreen','ColorYellow','ColorBlue','MediaPlay','MediaPause',
                   'MediaStop','PageUp','PageDown','ChannelUp','ChannelDown'];
    if(navKeys.indexOf(key) >= 0) activateTV();

    var zone = detectZone();
    if(zone !== focusZone){
      applyFocus(zone, 0);
    }

    /* input de texto — só trata Enter */
    var active = document.activeElement;
    var inInput = active && (active.tagName === 'INPUT');
    if(inInput){
      return;
    }

    switch(key){

      case 'ArrowUp':
        e.preventDefault();
        if(focusZone === 'list'){
          if(focusIndex > 0){ applyFocus('list', focusIndex - 1); }
          else { applyFocus('cats', 0); }
        } else if(focusZone === 'cats'){
          applyFocus('cats', focusIndex - 1);
        } else if(focusZone === 'player'){
          applyFocus('list', focusIndex);
        }
        break;

      case 'ArrowDown':
        e.preventDefault();
        if(focusZone === 'list'){
          applyFocus('list', focusIndex + 1);
        } else if(focusZone === 'cats'){
          var catItems = getItems('cats');
          if(focusIndex < catItems.length - 1){ applyFocus('cats', focusIndex + 1); }
          else { applyFocus('list', 0); }
        }
        break;

      case 'ArrowLeft':
        e.preventDefault();
        if(focusZone === 'player'){
          applyFocus('player', focusIndex - 1);
        } else if(focusZone === 'cats'){
          applyFocus('cats', focusIndex - 1);
        }
        /* list: sem ação para esquerda (já está no painel esquerdo) */
        break;

      case 'ArrowRight':
        e.preventDefault();
        if(focusZone === 'list' || focusZone === 'cats'){
          if(document.getElementById('right-panel').classList.contains('has-player')){
            applyFocus('player', 0);
          }
        } else if(focusZone === 'player'){
          applyFocus('player', focusIndex + 1);
        }
        break;

      case 'Enter': {
        e.preventDefault();
        var focused = document.querySelector('.tv-focus');
        if(focused) focused.click();
        break;
      }

      case 'Backspace':
      case 'Escape':
        e.preventDefault();
        if(focusZone === 'player'){
          applyFocus('list', focusIndex);
        } else if(document.getElementById('right-panel').classList.contains('has-player')){
          closePlayer();
        } else {
          applyFocus('list', 0);
        }
        break;

      /* Tecla vermelha → fecha player */
      case 'ColorRed':
        e.preventDefault();
        closePlayer();
        applyFocus('list', focusIndex);
        break;

      /* Tecla verde → recarrega */
      case 'ColorGreen':
        e.preventDefault();
        reloadPlayer();
        break;

      /* Tecla amarela ou 0 → fullscreen */
      case 'ColorYellow':
      case '0':
      case 'Numpad0':
        e.preventDefault();
        if(document.getElementById('right-panel').classList.contains('has-player')){
          toggleFullscreen();
        }
        break;

      /* Tecla azul → vai para categorias */
      case 'ColorBlue':
        e.preventDefault();
        applyFocus('cats', 0);
        break;

      /* PageUp/Down → pula 8 canais */
      case 'PageUp':
        e.preventDefault();
        applyFocus('list', Math.max(0, focusIndex - 8));
        break;
      case 'PageDown':
        e.preventDefault();
        applyFocus('list', focusIndex + 8);
        break;

      /* Canal +/- */
      case 'ChannelUp':
        e.preventDefault();
        applyFocus('list', Math.max(0, focusIndex - 1));
        break;
      case 'ChannelDown':
        e.preventDefault();
        applyFocus('list', focusIndex + 1);
        break;
    }
  }, true);

  /* Mouse/ponteiro físico: desativa modo TV
     TV Box usa pointermove, mousemove e às vezes touch */
  var _mouseTimer;
  function onRealPointer(){
    clearTimeout(_mouseTimer);
    /* pequeno delay para não desativar no primeiro frame de um clique do controle */
    _mouseTimer = setTimeout(function(){
      if(tvMode){
        tvMode = false;
        document.body.classList.remove('tv-mode');
        document.querySelectorAll('.tv-focus').forEach(function(el){ el.classList.remove('tv-focus'); });
      }
    }, 80);
  }
  /* captura os três eventos que um mouse físico gera mas controle remoto NÃO gera */
  document.addEventListener('mousemove',   onRealPointer);
  document.addEventListener('pointermove', function(e){
    /* ignora se vier de toque ou caneta — só mouse físico tem pointerType 'mouse' */
    if(e.pointerType === 'mouse') onRealPointer();
  });

})();
</script>
